Aula 17: Import e Export no React:

Quando abrimos o arquivo main.jsx no projeto padrão do Vite, percebemos que ele 
sempre inicia o projeto importando o React e o ReactDOM.

Antes, no começo do curso, nós fazíamos isso usando CDNs, mas agora usamos o método import.
Essas importações estão vindo diretamente da pasta node_modules, que é onde ficam 
todas as dependências.

👉 Sempre que formos criar a página de renderização (onde está o método render), 
precisamos importar o React e o ReactDOM.

No arquivo App.jsx, além disso, trabalhamos também com estados. Logo no topo vemos 
a importação do useState.
Antes precisaríamos usar React.useState, mas agora, com a importação, basta usar direto useState.



Se quisermos usar outro recurso do React, como o useEffect, podemos adicionar junto:
import { useState, useEffect } from 'react'

Assim, podemos ir importando os recursos que vamos precisar da biblioteca do React.


📌 Outra coisa importante:

. No App.jsx, também fazemos a importação dos arquivos CSS.
. Na main.jsx, importamos o componente App.



Criando nossa própria estrutura de componentes:
Agora vamos fazer um exercício para entender melhor como funciona importação e exportação.

1. Dentro da pasta src, vamos criar uma nova pasta chamada components.

  . Essa prática é muito comum, porque deixa o projeto mais organizado.
  . Podemos chamar de components, comp, ou qualquer outro nome, mas o importante é ter 
  uma pasta dedicada só para os componentes.


2. Dentro de components, vamos criar um arquivo chamado NavBar.jsx.

3. Nesse arquivo, vamos criar um componente funcional chamado NavBar, que retorna apenas um <nav></nav> simples.


Exportando o componente:
Para exportar o componente e poder usá-lo em outros lugares, temos duas opções:

. Colocar export antes da função;
. Usar export default, que permite rebatizar o componente ao importar.

Exemplo:

export function NavBar() {
    return (
        <nav></nav>
    )
}


Importando Componentes:
Depois de criar o NavBar, vamos importar ele no main.jsx.


Aqui tem um detalhe importante:
. Quando colocamos import e digitamos o nome do componente (ex: NavBar), muitas vezes o VS Code já sugere e completa automaticamente o caminho.
. Mas o passo a passo é:
  1. Escrevemos import,
  2. Colocamos o nome do componente entre { },
  3. Depois usamos from e informamos o caminho do arquivo.

Exemplo:
import { StrictMode } from 'react'
import { createRoot } from 'react-dom/client'
import './index.css'
import { NavBar } from './components/NavBar'


Agora já podemos usar o componente para renderizar:
createRoot(document.getElementById('root')).render(
  <StrictMode>
    <NavBar />
  </StrictMode>,
)

✅ Pronto! Agora o NavBar está sendo renderizado na tela.


Criando CSS específico para um componente:
Se criamos um componente só para o nav, podemos também criar um CSS específico 
para ele. Isso deixa o projeto ainda mais organizado.

No topo do NavBar.jsx, importamos o CSS:
import './NavBar.css'

export function NavBar() {
    return (
        <nav></nav>
    )
}

Depois, dentro de components, criamos um novo arquivo chamado NavBar.css, 
onde colocamos os estilos apenas para esse componente.

Assim, esse CSS será aplicado somente ao NavBar, mantendo cada parte do projeto 
isolada e bem organizada.



Criando múltiplos componentes no mesmo arquivo:
Agora vamos avançar um pouco mais:
Dentro do NavBar.jsx, podemos criar também um SubNavBar.

Exemplo:
📂 NavBar.jsx

import './NavBar.css'

export function NavBar() {
    return (
        <nav></nav>
    )
}

export function SubNavBar() {
    return (
        <nav></nav>
    )
}

📂 main.jsx

import { StrictMode } from 'react'
import { createRoot } from 'react-dom/client'
import './index.css'
import { NavBar, SubNavBar } from './components/NavBar'

createRoot(document.getElementById('root')).render(
  <StrictMode>
    <NavBar />
  </StrictMode>,
)


👉 Perceba que na importação colocamos os dois componentes 
entre { }, separados por vírgula.

Isso mostra que podemos ter mais de um componente dentro do 
mesmo arquivo e importá-los normalmente.



Trabalhando com Estado dentro de um componente:
Se quisermos trabalhar com estado dentro do NavBar, precisamos 
importar o useState.
Exemplo:

import './NavBar.css'
import { useState } from 'react'

export function NavBar() {
    const [nav, setNav] = useState('');
    return (
        <nav></nav>
    )
}

export function SubNavBar() {
    return (
        <nav></nav>
    )
}


Usando o useEffect:
Se além de estado quisermos trabalhar com efeitos colaterais, também 
podemos importar o useEffect.

Exemplo:
import './NavBar.css'
import { useState, useEffect } from 'react'

export function NavBar() {
    const [nav, setNav] = useState('');

    useEffect(() => {
        console.log('legal, ativou efeito colateral')
    })

    return (
        <nav></nav>
    )
}

export function SubNavBar() {
    return (
        <nav></nav>
    )
}

💡 Nesse exemplo, sempre que o componente for renderizado, a mensagem 
"legal, ativou efeito colateral" vai aparecer no console.


Conclusão:

. Vimos como usar importações e exportações para organizar o projeto.
.riamos componentes em uma pasta específica (components).
. Aprendemos a usar export e import de várias formas.
. Vimos como trabalhar com estados (useState) e efeitos colaterais (useEffect) dentro dos componentes.
. E entendemos como deixar o projeto mais organizado usando CSS específico para cada componente.



-->
