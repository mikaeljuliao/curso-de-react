Aula 25 – Projeto Final: Componente Card

Nesta aula iremos trabalhar na área principal da nossa aplicação, que é a parte dos cards.

Os cards terão:
. Um Swiper para exibir imagens.
. Dados dinâmicos como imagens, títulos, localização, nota e preço.
. Informações sendo puxadas de uma API externa que nós mesmos criamos.
. Vamos aprender a fazer requisições para a API e exibir os dados certinhos nos cards.
. Também vamos implementar responsividade, fazendo com que os cards se adaptem a diferentes tamanhos de tela.
. E vamos trabalhar na questão dos filtros, de forma que ao alterar um filtro, os cards atualizem automaticamente.



Criando o Componente Card.jsx:
👉 Então vamos colocar a mão na massa!
A primeira coisa que faremos é criar o componente Card.jsx, que será responsável por renderizar cada card.

Depois, importamos ele no App.jsx e retornamos dentro do nosso componente principal.

Exemplo:

}


Também criamos um arquivo CSS para o componente e importamos dentro dele.

Exemplo:

Importando os Dados do Backend:
nos criamos um array de objetos para simularmos uma api.

Antes de integrar com a API, vamos puxar os dados localmente do nosso arquivo backend.

Exemplo:
import { acomodacoes } from '../../backend/dados';

Renderizando os Cards com .map() no React:

Nosso objetivo é que cada acomodação vire automaticamente um card na tela.
Para isso, usamos o método .map(), que percorre os itens de um array e gera JSX para cada objeto.

Exemplo Básico
import { acomodacoes } from '../../backend/dados';

export default function Card() {
  return (
    <div className='container-fluid'>
      <div className='container-airbnb row'>
        {acomodacoes.map((acomodacao) => (
          <div key={acomodacao.id} className='col-xxl-2'>
            <img src={acomodacao.imagens[0]} className='img-fluid' alt={acomodacao.titulo} />
            
            <p>
              <span>{acomodacao.cidade}, {acomodacao.pais}</span>
              <span className='mdi mdi-star'> {acomodacao.nota}</span>
            </p>

            <p className='text-muted my-0'>50 KM de distância</p>
            <p className='text-muted'>10 de jan - 28 fev</p>
            <p>{acomodacao.preco.toLocaleString('pt-BR')} noite</p>
          </div>
        ))}
      </div>
    </div>
  );
}


Explicação Detalhada:
1) O método .map()
. .map() é um método de arrays que cria um novo array aplicando uma função a cada item.
. Em React, usamos .map() para transformar cada objeto em JSX, ou seja, elementos da interface.
. Diferente de .forEach(), o .map() retorna valores, e por isso é o correto para renderizar listas no React.


👉 Exemplo mental:
acomodacoes = [{id: 1, titulo: "Casa"}, {id: 2, titulo: "Apartamento"}];
acomodacoes.map(acom => <div>{acom.titulo}</div>);

➡️ Resultado: um array de <div> pronto para renderizar na tela.


2) A prop key={}
. A key dá uma identidade única para cada elemento da lista.
. O React usa isso no algoritmo de reconciliação para saber quais elementos mudaram, foram adicionados ou removidos.

👉 Se você usar índices (key={i}) em vez de um ID estável, pode gerar problemas:
. O React pode reaproveitar nós DOM errados, causando bugs (por exemplo, valores de inputs trocando de posição).
. Pode causar re-renderizações desnecessárias, piorando o desempenho.

✅ Boa prática: sempre usar um ID estável vindo do backend.


3) Sistema de Grid (Bootstrap)
. container-fluid e row fazem parte do grid system do Bootstrap.
. col-xxl-2 significa que o card ocupa 2 colunas em telas extra grandes (12 colunas no total).

👉 Melhor prática: adicionar classes para várias resoluções:

className="col-xxl-2 col-lg-3 col-md-4 col-sm-6"


➡️ Assim os cards ficam responsivos, adaptando-se em diferentes tamanhos de tela.



4) Imagens (<img />)
. acomodacao.imagens é um array de URLs.
. acomodacao.imagens[0] pega a primeira imagem do array.

Boas práticas:
. Sempre use alt descritivo (para acessibilidade e SEO).

alt={acomodacao.titulo || `${acomodacao.cidade}, ${acomodacao.pais}`}

. Use loading="lazy" para carregar imagens apenas quando aparecerem na tela (melhorando desempenho).

<img
  src={acomodacao.imagens[0]}
  alt={acomodacao.titulo || `${acomodacao.cidade}, ${acomodacao.pais}`}
  className="img-fluid"
  loading="lazy"
/>



5) Formatação de Preço:
. O código acomodacao.preco.toLocaleString('pt-BR') formata o número no padrão brasileiro (ex.: 2500 → 2.500).
. Para exibir como moeda (R$), use:

acomodacao.preco.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })


➡️ Exemplo: 2500 → R$ 2.500,00

⚠️ Atenção: toLocaleString='pt-br' (com sinal de =) está errado. O correto é passar 'pt-BR' como argumento da função.


Exemplo com Melhorias Aplicadas:

Aqui está o mesmo código, mas com boas práticas adicionadas (responsividade, acessibilidade e formatação de preço):

  <div key={acomodacao.id} className="col-xxl-2 col-lg-3 col-md-4 col-sm-6 mb-4">
    <img
      src={acomodacao.imagens[0]}
      alt={acomodacao.titulo || `${acomodacao.cidade} - ${acomodacao.pais}`}
      className="img-fluid"

    />
    <p>

      <span className="ms-2 mdi mdi-star"> {acomodacao.nota}</span>

    <p className='text-muted my-0'>{getRandomInt(10, 800)} KM de distância</p>

  </div>
))}

✅ Resumo
1. .map() transforma arrays em listas de JSX.
2. Sempre usar key estável (ID do banco) para evitar bugs.
3. Classes de grid (col-xxl-2, etc.) garantem layout responsivo.
4.Imagens devem ter alt e loading="lazy".
5. Formatação de preço deve usar toLocaleString corretamente.
6. Podemos enriquecer os cards com informações aleatórias (distância, datas) enquanto aprendemos os conceitos do React.





CSS Inline no React:

No React, quando passamos estilos inline, usamos a tag style.
O CSS é tratado como um objeto JS, então:

style={{}} abre o objeto.

As propriedades devem estar em camelCase, e não com hífen.

Exemplo:
<span
  style={{
    border: '1px solid red',
    display: 'block',
    maxWidth: '160px'
  }}
  className='fw-bold text-truncate'
>
  {acomodacao.cidade}, {acomodacao.pais}
</span>




Criando Função para Números Aleatórios:

Queremos simular dados como distância e datas.
Para isso, criamos uma função que gera números aleatórios inteiros dentro de um intervalo.

Exemplo:
function getRandomInt(min, max) {
  min = Math.ceil(min);   // arredonda o mínimo para cima
  max = Math.floor(max);  // arredonda o máximo para baixo
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

Explicação detalhada:

Math.random() gera um número entre 0 e 1.

Multiplicamos pelo intervalo (max - min + 1).

Math.floor() arredonda o número para baixo.

Somamos + min para garantir que o número mínimo seja respeitado.

📌 Exemplo:

Chamando getRandomInt(10, 600), ele pode retornar valores como 10, 45, 320, 599, 600.

Usando Função Aleatória na Distância

Chamamos a função diretamente dentro do JSX:

<p className='text-muted my-0'>{getRandomInt(10, 800)} KM de distância</p>


➡️ Assim, cada card mostrará uma distância aleatória entre 10 e 800 km.
Exemplos possíveis: 12 KM, 350 KM, 799 KM.

Usando Função Aleatória para Datas

Também podemos simular datas de hospedagem:

<p className='text-muted'>
  {getRandomInt(1, 31)} de jan - {getRandomInt(1, 28)} de fev
</p>


➡️ Exemplo de resultados:

12 de jan - 25 de fev

5 de jan - 14 de fev

Isso cria variações aleatórias e economiza tempo, já que o foco aqui é entender os conceitos de React.
